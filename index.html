<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Kaos Kartları - Parti Oyunu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: white;
            overflow: hidden; /* Prevent scrolling on mobile */
            touch-action: manipulation; /* Prevent double-tap zoom */
        }

        /* Card 3D Effect */
        .card-container {
            perspective: 1000px;
            width: 85vw;
            max-width: 320px;
            height: 60vh;
            max-height: 450px;
            margin: 0 auto;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .card.is-flipped {
            transform: rotateY(180deg) scale(1.05);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            padding: 2rem;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* Front of the card (Logo) */
        .card-front {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            /* Neon glow effect */
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5), inset 0 0 20px rgba(255,255,255,0.2);
        }

        .card-front-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 20px 20px;
            opacity: 0.3;
            border-radius: 20px;
        }

        /* Back of the card (Dare) */
        .card-back {
            background: #1e293b;
            transform: rotateY(180deg);
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.4);
            border-color: #ec4899;
        }

        .dare-category {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ec4899;
            font-weight: 800;
            margin-bottom: 1rem;
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            left: 0;
        }

        .dare-text {
            font-size: clamp(1.1rem, 5vw, 1.5rem);
            font-weight: 600;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-y: auto;
            max-height: 70%;
            width: 100%;
            padding: 0 10px;
            scrollbar-width: none; /* Firefox */
        }
        
        .dare-text::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Edge */
        }

        /* Floating background elements */
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }
        .bg-blob {
            animation: pulse-slow 8s infinite ease-in-out;
        }

        /* Custom Scrollbar for History Modal */
        #historyList::-webkit-scrollbar {
            width: 6px;
        }
        #historyList::-webkit-scrollbar-track {
            background: #0f172a; 
            border-radius: 10px;
        }
        #historyList::-webkit-scrollbar-thumb {
            background: #ec4899; 
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative antialiased selection:bg-pink-500 selection:text-white">

    <!-- Background Effects -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] opacity-30 bg-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-pink-600 rounded-full mix-blend-screen filter blur-[100px] opacity-30 bg-blob" style="animation-delay: 4s;"></div>
    </div>

    <!-- Header -->
    <header class="w-full py-6 flex flex-col items-center justify-center z-10 mt-12 md:mt-4 relative">
        <button id="resetBtn" class="absolute -top-2 md:top-2 left-4 md:left-10 bg-[#1e293b] hover:bg-[#ef4444] text-white py-2 px-4 rounded-full border border-[#ef4444] shadow-[0_0_10px_rgba(239,68,68,0.3)] transition-all text-sm font-semibold flex items-center gap-2 z-20 group">
            <span class="group-hover:-rotate-180 transition-transform duration-500 inline-block">🔄</span> <span class="hidden md:inline">Sıfırla</span>
        </button>
        
        <button id="historyBtn" class="absolute -top-2 md:top-2 right-4 md:right-10 bg-[#1e293b] hover:bg-[#334155] text-white py-2 px-4 rounded-full border border-[#ec4899] shadow-[0_0_10px_rgba(236,72,153,0.3)] transition-all text-sm font-semibold flex items-center gap-2 z-20">
            <span>📜</span> <span class="hidden md:inline">Geçmiş</span> <span id="historyCount" class="bg-[#ec4899] text-white text-xs px-2 py-0.5 rounded-full ml-1">0</span>
        </button>

        <h1 class="text-4xl md:text-5xl text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 mb-2 mt-4 md:mt-0 text-center px-2 font-extrabold tracking-tight">KAOS KARTLARI</h1>
        <p class="text-gray-400 text-sm md:text-base font-semibold tracking-wide">Cesaretin var mı?</p>
    </header>

    <!-- Main Game Area -->
    <main class="flex-grow flex flex-col items-center justify-center z-10 w-full">
        
        <div class="card-container" id="cardContainer">
            <div class="card" id="card">
                <!-- Front Side -->
                <div class="card-face card-front flex flex-col justify-center items-center">
                    <div class="card-front-pattern"></div>
                    <div class="text-6xl mb-4 z-10 animate-bounce">🃏</div>
                    <h2 class="text-3xl font-bold text-white z-10 uppercase tracking-widest drop-shadow-lg">Dokun</h2>
                    <p class="text-blue-200 mt-2 z-10 text-sm opacity-80">veya butona bas</p>
                </div>
                
                <!-- Back Side -->
                <div class="card-face card-back">
                    <div class="dare-category" id="dareCategory">KATEGORİ</div>
                    <div class="dare-text text-white" id="dareText">
                        Buraya çok çılgın bir görev gelecek. Hazır ol!
                    </div>
                    <div class="absolute bottom-6 w-full text-center left-0 text-xs text-gray-500 uppercase tracking-widest">
                        Kaos Kartları
                    </div>
                </div>
            </div>
        </div>

        <button id="drawBtn" class="mt-10 md:mt-12 bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white font-bold py-4 px-12 rounded-full text-lg shadow-[0_0_20px_rgba(236,72,153,0.5)] transition-all transform hover:scale-105 active:scale-95 uppercase tracking-wider">
            Kart Çek
        </button>
        
        <p id="cardsLeft" class="mt-4 text-gray-400 text-sm font-medium">Kalan Kart: <span id="cardsLeftCount">0</span></p>

    </main>

    <!-- History Modal -->
    <div id="historyModal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-[#1e293b] border border-[#ec4899] w-full max-w-md rounded-2xl p-6 shadow-[0_0_40px_rgba(236,72,153,0.2)] flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-700">
                <h3 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400">Çekilen Kartlar Geçmişi</h3>
                <button id="closeHistoryBtn" class="text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
            </div>
            
            <div id="historyList" class="overflow-y-auto flex-grow flex flex-col gap-3 pr-2">
                <!-- History items will be injected here -->
                <p class="text-gray-500 text-center italic mt-4">Henüz hiç kart çekilmedi.</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // DOM Elements
        const card = document.getElementById('card');
        const cardContainer = document.getElementById('cardContainer');
        const drawBtn = document.getElementById('drawBtn');
        const dareCategory = document.getElementById('dareCategory');
        const dareText = document.getElementById('dareText');
        
        const historyBtn = document.getElementById('historyBtn');
        const historyModal = document.getElementById('historyModal');
        const closeHistoryBtn = document.getElementById('closeHistoryBtn');
        const historyList = document.getElementById('historyList');
        const historyCountDisplay = document.getElementById('historyCount');
        
        const resetBtn = document.getElementById('resetBtn');
        const cardsLeftCount = document.getElementById('cardsLeftCount');

        // Oyun Verileri - Dengelenmiş ve Komik Cezalar
        const daresPool = [
            // 🟩 HAFİF
            { level: "🟩 HAFİF", text: "Son izlediğin Reels veya TikTok videosunu grup sohbetine gönder ve 'İşte hayatımın özeti' yaz." },
            { level: "🟩 HAFİF", text: "Telefonunun şarj yüzdesini bağırarak söyle." },
            { level: "🟩 HAFİF", text: "En son kime ne mesaj attığını sesli bir şekilde oku." },
            { level: "🟩 HAFİF", text: "Kullanmadığın ve saçma bulduğun 3 uygulamayı hemen şimdi telefonundan sil." },
            { level: "🟩 HAFİF", text: "En son kimi stalkladığını gruba itiraf et." },
            { level: "🟩 HAFİF", text: "Spotify/Apple Music'te en son çaldığın şarkıyı açıp 10 saniye boyunca playback yap." },
            { level: "🟩 HAFİF", text: "Telefonunun duvar kağıdını herkese göster ve nedenini açıkla." },
            { level: "🟩 HAFİF", text: "Ekrana burnunla dokunarak birine 'Naber' mesajı yazmaya çalış." },
            { level: "🟩 HAFİF", text: "Arama geçmişindeki son 3 şeyi (çok özel değilse) sesli oku." },
            { level: "🟩 HAFİF", text: "Gruptan birinin taklidini yap, diğerleri kim olduğunu bulsun." },

            // 🟨 ORTA
            { level: "🟨 ORTA", text: "Instagram'da takip ettiğin rastgele birine DM at: 'Dün gece rüyamdaydın, çok garipti.'" },
            { level: "🟨 ORTA", text: "WhatsApp durumuna 'Beklenen an geldi...' yaz ve 15 dakika boyunca silme." },
            { level: "🟨 ORTA", text: "Bir arkadaşının Instagram'daki en eski fotoğrafını bulup beğen." },
            { level: "🟨 ORTA", text: "Siri veya Google Asistan'a saçma sapan bir soru sor ve cevabını gruba dinlet." },
            { level: "🟨 ORTA", text: "Son arananlar listenden 5. kişiyi ara, telefonu açarsa 'Pardon cebimde çalmış' de." },
            { level: "🟨 ORTA", text: "Birisine 'Senin hakkında bir şey duydum...' yazıp 10 dakika boyunca cevap verme." },
            { level: "🟨 ORTA", text: "Instagram hikayene tamamen siyah bir ekran atıp sadece '...' yaz." },
            { level: "🟨 ORTA", text: "Rehberden rastgele birine 'O işi naptın?' yaz." },
            { level: "🟨 ORTA", text: "Instagram'da anasayfana düşen ilk 3 postu gönderen kişilere bakmadan beğen." },
            { level: "🟨 ORTA", text: "Telefonunu solundaki kişiye ver, senin ağzından Instagram'dan birine sadece '1' adet emoji atsın." },
            { level: "🟨 ORTA", text: "Gruptaki en komik bulduğun kişiye 1 dakika boyunca ciddi bir şekilde iltifat et." },
            { level: "🟨 ORTA", text: "Son konuştuğun WhatsApp grubuna 'Ben galiba aşık oldum' yaz ve telefonu kapat." },
            { level: "🟨 ORTA", text: "Instagram arama geçmişindeki ilk ismi yüksek sesle söyle." },
            { level: "🟨 ORTA", text: "WhatsApp'ta en son kime 'hahaha' veya 'random' güldüysen ona 'Aslında hiç komik değildi' yaz." },

            // 🟧 AĞIR
            { level: "🟧 AĞIR", text: "Instagram ana sayfana düşen ilk gönderiye 'Bu gerçekten gerekli miydi?' yorumunu yap." },
            { level: "🟧 AĞIR", text: "WhatsApp'ta en son konuştuğun kişiye 'Sana bir sır vermem lazım ama aramızda kalacak' yaz ve 5 dakika bekle." },
            { level: "🟧 AĞIR", text: "Eski bir sınıf arkadaşına/tanıdığına mesaj at: 'Geçen gün seni gördüm sanki, nasılsın?'" },
            { level: "🟧 AĞIR", text: "Hikayene sadece bir bardak su fotoğrafı atıp 'Bunu anlayan anladı...' yaz." },
            { level: "🟧 AĞIR", text: "Rehberinden gözün kapalı birini seç ve ona sadece uzaylı (👽) emojisi gönder." },
            { level: "🟧 AĞIR", text: "Annene veya babana 'Bugün çok garip bir rüya gördüm, sonra detaylı anlatacağım' yaz." },
            { level: "🟧 AĞIR", text: "Bir arkadaşına DM'den kendi özçekimini (selfie) at ve 'Sence de bugün çok iyi görünmüyor muyum?' yaz." },
            { level: "🟧 AĞIR", text: "Instagram'dan rastgele birine 'Tişörtün nerden?' diye DM at (Profilinde tişört olmasa bile)." },
            { level: "🟧 AĞIR", text: "WhatsApp'ta 3 farklı kişiye aynı anda 'Bana acil 50 TL ateşler misin?' yaz." },
            { level: "🟧 AĞIR", text: "Rehberindeki 10. kişiye mesaj at: 'Dünkü olay aramızda sır kalacak değil mi?'" },
            { level: "🟧 AĞIR", text: "Yakın bir arkadaşına mesaj at: 'Seni rüyamda gördüm, bence acil kurşun döktürmen lazım.'" },
            { level: "🟧 AĞIR", text: "Kendi Instagram fotoğrafına sahte bir hesaptan yazıyormuş gibi 'Çok güzelsin/yakışıklısın' yorumu yap." },
            { level: "🟧 AĞIR", text: "Son arananlar listendeki 3. kişiye mesaj at: 'Şifreyi buldum, parayı hazırlayın.'" },
            { level: "🟧 AĞIR", text: "Hikayene bir şarkı sözü paylaş ama bilerek çok arabesk ve damar bir şarkı olsun." },

            // 🟥 KAOS
            { level: "🟥 KAOS", text: "Son aranan 10 kişiden birine mesaj at: 'Kırbaç mı kelepçe mi tercih edersin?'" },
            { level: "🟥 KAOS", text: "Kamerayı aç, dişinde bir şey var mı diye incelediğin garip ve sessiz bir videoyu Instagram hikayende paylaş." },
            { level: "🟥 KAOS", text: "WhatsApp durumuna 'Uzaylılara inanmaya başladım, yakında açıklayacağım' yaz." },
            { level: "🟥 KAOS", text: "Rehberden 3. kişiye mesaj at: 'Evde misin? Geliyorum.' ve cevap verirse oyalama." },
            { level: "🟥 KAOS", text: "Instagram'da hikayesine denk geldiğin ilk kişiye (tanısan da tanımasan da) 'Ateş ediyorsun 🔥' yaz." },
            { level: "🟥 KAOS", text: "En son konuştuğun 3. kişiye sadece 'Miyav' yaz ve hiçbir açıklama yapma." },
            { level: "🟥 KAOS", text: "Uzaktan bir akrabana durduk yere mesaj at: 'Nasılsınız, sizi çok özledim.'" },
            { level: "🟥 KAOS", text: "Birine ses kaydı at ve sadece 10 saniye boyunca derin derin nefes alıp ver." },
            { level: "🟥 KAOS", text: "Gruptaki birinin telefonundan kendi telefonuna 'Senin kadar mükemmel birini tanımadım' mesajı at." },
            { level: "🟥 KAOS", text: "Instagram'da arama kısmına 'a' yaz, çıkan ilk kişiye 'Seni bulmam uzun sürdü' diye DM at." },
            { level: "🟥 KAOS", text: "Rehberinden rastgele birini ara, açarsa 'Siparişiniz yola çıktı, 10 dakikaya kapıdayız' de ve kapat." },
            { level: "🟥 KAOS", text: "Instagram'da bir arkadaşının annesini/babasını bul (veya abisini) ve son fotoğrafını beğen." },
            { level: "🟥 KAOS", text: "TikTok veya Reels aç, karşına çıkan ilk dans videosunu taklit edip gruba videosunu at." },
            { level: "🟥 KAOS", text: "WhatsApp durumuna sadece kendi IBAN'ını kopyalayıp yapıştır, hiçbir açıklama yazma." }
        ];

        let availableDares = [];
        let history = [];
        let isFlipping = false;

        // Kartları Karıştırma Fonksiyonu (Fisher-Yates)
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Oyunu Başlat / Sıfırla
        function initGame() {
            availableDares = [...daresPool];
            shuffleArray(availableDares);
            history = [];
            updateHistoryUI();
            updateCardsLeft();
            
            // Eğer kart açıksa kapat
            if (card.classList.contains('is-flipped')) {
                card.classList.remove('is-flipped');
            }
        }

        function updateCardsLeft() {
            cardsLeftCount.innerText = availableDares.length;
        }

        function updateHistoryUI() {
            historyCountDisplay.innerText = history.length;
            
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-gray-500 text-center italic mt-4">Henüz hiç kart çekilmedi.</p>';
                return;
            }

            historyList.innerHTML = '';
            // En son çekilen en üstte görünsün diye ters çeviriyoruz
            [...history].reverse().forEach((item, index) => {
                const historyItem = document.createElement('div');
                historyItem.className = 'bg-[#0f172a] p-3 rounded-xl border border-gray-700 flex flex-col gap-1';
                
                let textColor = 'text-green-400';
                if(item.level.includes("ORTA")) textColor = 'text-yellow-400';
                if(item.level.includes("AĞIR")) textColor = 'text-orange-400';
                if(item.level.includes("KAOS")) textColor = 'text-red-500';

                historyItem.innerHTML = `
                    <span class="text-xs font-bold ${textColor}">${item.level}</span>
                    <p class="text-sm text-gray-200">${item.text}</p>
                `;
                historyList.appendChild(historyItem);
            });
        }

        function drawRandomDare() {
            if (isFlipping) return;

            if (availableDares.length === 0) {
                alert("Oyun Bitti! Tüm kartlar çekildi. Yeniden başlamak için Sıfırla butonuna basın.");
                return;
            }

            isFlipping = true;
            drawBtn.disabled = true;
            drawBtn.classList.add('opacity-50', 'cursor-not-allowed');

            // Eğer kart zaten açıksa, önce kapat, bekle, sonra yenisini aç
            if (card.classList.contains('is-flipped')) {
                card.classList.remove('is-flipped');
                setTimeout(() => {
                    setNewCardAndFlip();
                }, 800); // Kapanma animasyonu süresi
            } else {
                setNewCardAndFlip();
            }
        }

        function setNewCardAndFlip() {
            // Desteden kart al
            const currentDare = availableDares.pop();
            
            // Tarihçeye ekle
            history.push(currentDare);
            updateHistoryUI();
            updateCardsLeft();

            // Rengi seviyeye göre ayarla
            if(currentDare.level.includes("HAFİF")) {
                dareCategory.style.color = "#4ade80"; // green
                card.querySelector('.card-back').style.boxShadow = "0 0 30px rgba(74, 222, 128, 0.4)";
                card.querySelector('.card-back').style.borderColor = "#4ade80";
            } else if (currentDare.level.includes("ORTA")) {
                dareCategory.style.color = "#facc15"; // yellow
                card.querySelector('.card-back').style.boxShadow = "0 0 30px rgba(250, 204, 21, 0.4)";
                card.querySelector('.card-back').style.borderColor = "#facc15";
            } else if (currentDare.level.includes("AĞIR")) {
                dareCategory.style.color = "#fb923c"; // orange
                card.querySelector('.card-back').style.boxShadow = "0 0 30px rgba(251, 146, 60, 0.4)";
                card.querySelector('.card-back').style.borderColor = "#fb923c";
            } else {
                dareCategory.style.color = "#ef4444"; // red
                card.querySelector('.card-back').style.boxShadow = "0 0 40px rgba(239, 68, 68, 0.6)";
                card.querySelector('.card-back').style.borderColor = "#ef4444";
            }

            // Metinleri güncelle
            dareCategory.innerText = currentDare.level;
            dareText.innerText = currentDare.text;

            // Kartı çevir
            card.classList.add('is-flipped');

            // Animasyon bittikten sonra kilitleri aç
            setTimeout(() => {
                isFlipping = false;
                drawBtn.disabled = false;
                drawBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }, 800);
        }

        // Event Listeners
        drawBtn.addEventListener('click', drawRandomDare);
        cardContainer.addEventListener('click', drawRandomDare);
        
        resetBtn.addEventListener('click', () => {
            if(confirm("Tüm kartları karıştırıp oyunu sıfırlamak istediğine emin misin?")) {
                initGame();
            }
        });

        // Modal Controls
        historyBtn.addEventListener('click', () => {
            historyModal.classList.remove('hidden');
            historyModal.classList.add('flex');
        });

        closeHistoryBtn.addEventListener('click', () => {
            historyModal.classList.add('hidden');
            historyModal.classList.remove('flex');
        });

        // Close modal when clicking outside
        historyModal.addEventListener('click', (e) => {
            if (e.target === historyModal) {
                historyModal.classList.add('hidden');
                historyModal.classList.remove('flex');
            }
        });

        // Oyunu ilk kez başlat
        initGame();
    </script>
</body>
</html>
