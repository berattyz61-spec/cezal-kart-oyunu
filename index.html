<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Kaos Kartları - Parti Oyunu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
            touch-action: manipulation;
        }

        h1 {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ec4899, 0 0 20px #ec4899;
        }

        /* Card 3D Effect */
        .card-container {
            perspective: 1000px;
            width: 85vw;
            max-width: 320px;
            height: 60vh;
            max-height: 450px;
            margin: 0 auto;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg) scale(1.05);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* Front of the card (The cover) */
        .card-front {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: white;
        }

        .card-front::before {
            content: '?';
            font-size: 8rem;
            font-family: 'Bangers', cursive;
            opacity: 0.5;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .card-front .logo-text {
            position: absolute;
            bottom: 30px;
            font-family: 'Bangers', cursive;
            font-size: 2rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000;
        }

        /* Back of the card (The Dare) */
        .card-back {
            background: #1e293b;
            color: white;
            transform: rotateY(180deg);
            border-color: #ec4899;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4), inset 0 0 20px rgba(236, 72, 153, 0.2);
        }

        .dare-category {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ec4899;
            font-weight: 800;
            margin-bottom: 1rem;
            position: absolute;
            top: 30px;
        }

        .dare-text {
            font-size: clamp(1.1rem, 5vw, 1.5rem);
            font-weight: 600;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-y: auto;
            max-height: 70%;
            width: 100%;
            padding: 0 10px;
            /* Scrollbar styling for text */
            scrollbar-width: none; /* Firefox */
        }
        .dare-text::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Edge */
        }

        /* Particle animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .floating {
            animation: float 4s ease-in-out infinite;
        }

        /* Button Glow */
        .btn-glow {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.9);
            transform: translateY(-2px);
        }
        .btn-glow:active {
            transform: translateY(2px);
        }

        /* Modal (Geçmiş) Stilleri */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #1e293b;
            border: 2px solid #ec4899;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.2);
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex-grow: 1;
            /* Scrollbar styling */
            scrollbar-width: thin;
            scrollbar-color: #ec4899 #1e293b;
        }
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background-color: #ec4899;
            border-radius: 20px;
        }
        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #fff;
            transition: transform 0.2s;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }
        
        .level-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            color: #fff;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col relative w-full h-full">

    <div class="absolute bottom-10 right-10 w-32 h-32 bg-pink-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse" style="animation-delay: 1s;"></div>

            <span class="group-hover:-rotate-180 transition-transform duration-500 inline-block">🔄</span> <span class="hidden md:inline">Sıfırla</span>
        </button>
        <button id="historyBtn" class="absolute -top-2 md:top-2 right-4 md:right-10 bg-[#1e293b] hover:bg-[#334155] text-white py-2 px-4 rounded-full border border-[#ec4899] shadow-[0_0_10px_rgba(236,72,153,0.3)] transition-all text-sm font-semibold flex items-center gap-2 z-20">
            <span>📜</span> <span class="hidden md:inline">Geçmiş</span> <span id="historyCount" class="bg-[#ec4899] text-white text-xs px-2 py-0.5 rounded-full ml-1">0</span>
        </button>
        <h1 class="text-4xl md:text-6xl text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 mb-2 mt-4 md:mt-0 text-center px-2 leading-tight">KAOS KARTLARI</h1>
        <p class="text-gray-400 text-sm md:text-base font-semibold tracking-wide">Cesaretin var mı?</p>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center z-10 px-4 w-full max-w-md mx-auto">
        
        <div class="card-container floating mb-12" id="cardContainer">
            <div class="card" id="gameCard">
                <div class="card-face card-front">
                    <div class="logo-text">KAOS</div>
                </div>
                <div class="card-face card-back">
                    <div class="dare-category" id="dareCategory">CEZA</div>
                    <div class="dare-text" id="dareText">
                        İlk kartı çekmek için aşağıdaki butona tıkla!
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full flex justify-center pb-8">
            <button id="drawBtn" class="btn-glow bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-4 px-10 rounded-full text-xl w-full max-w-[250px] uppercase tracking-wider relative overflow-hidden">
                <span class="relative z-10">Kart Çek</span>
            </button>
        </div>
    </main>

    <!-- Geçmiş Modalı -->
    <div id="historyModal" class="modal-overlay">
        <div class="modal-content relative">
            <div class="modal-header">
                <button id="closeModalBtn" class="absolute top-4 right-5 text-gray-400 hover:text-white text-3xl font-bold">&times;</button>
                <h2 class="text-2xl font-bold text-center text-pink-500" style="font-family: 'Bangers', cursive; letter-spacing: 2px;">CEZA GEÇMİŞİ</h2>
            </div>
            <div class="modal-body">
                <div id="historyList" class="flex flex-col">

                </div>
            </div>
        </div>
    </div>

            { level: 4, text: "Instagram'daki en büyük düşmanının/sevmediğin kişinin gönderisine kalp at." },
            { level: 4, text: "Telefon rehberindeki 1. kişiye 'Aşağıdayım, in.' yaz." },
            { level: 4, text: "Karşı cinsten kankana (sevgilisi olmayan) 'Uzun zamandır içimde tutuyorum, galiba senden hoşlanıyorum.' yaz." },
            { level: 4, text: "Patronuna veya hocana gecenin bu saatinde 'Nasılsın canım?' mesajı at." },
            { level: 4, text: "Eski sevgilinin annesine veya kardeşine DM at: 'Eski günleri özledim, selam söyle.'" },
            { level: 4, text: "WhatsApp durumuna 'Kabul ediyorum, uzaylılar aramızda ve ben de onlardan biriyim' yaz ve 1 saat silme." },
            { level: 4, text: "Instagram'da seni takip eden rastgele birine 'Evlen benimle' yaz." },
            { level: 4, text: "TikTok veya Instagram Reels'a gir, karşına çıkan ilk sese playback yaparak utanç verici bir hikaye çek." },
            { level: 4, text: "Eski fotoğraflarından en rüküş olanını bulup Instagram hikayene 'Moda ikonu olduğum yıllar' yazarak at." },
            { level: 4, text: "Telefonun alarmını 1 dakika sonraya kur, çalınca 'Eyvah bomba patlayacak!' diye bağır ve masanın altına saklan." },
            { level: 4, text: "Instagram'da arama kısmına 'Kedi' veya 'Ördek' yaz, çıkan ilk videoyu hikayende paylaşıp 'İşte benim ruh eşim' yaz." },
            { level: 4, text: "Rehberden rastgele birine 'Dün gece rüyamda seni gördüm, çok ateşliydi' mesajı at." },
            { level: 4, text: "WhatsApp aile grubuna 'Ben okulu/işi bırakıp dağ evinde tek başıma yaşamaya karar verdim' yaz." },
            { level: 4, text: "Instagram hikayene sadece konum olarak 'Terk Edilmiş Akıl Hastanesi' ekle ve siyah ekran paylaş." },
            { level: 4, text: "'Yanlışlıkla' eski flörtüne 'Dün gece için sağol' yaz." },
            { level: 4, text: "En son kime mesaj attıysan ona 'Peşimdeler, çabuk adresini ver oraya geliyorum' yaz." },
            { level: 4, text: "Telefonunu ortaya koy, gruptan biri istediği 3 kişiye senin ağzından ses kaydı atsın." },
            { level: 4, text: "WhatsApp durumuna 'Şu an ağlıyorum, lütfen kimse yazmasın' yaz." },
            { level: 4, text: "Rastgele bir numarayı ara ve panik bir sesle 'Ben gelecekten geliyorum, yarın evden çıkma!' de." },
            { level: 4, text: "Babana 'Kriptoda tüm paramı batırdım, tefecilere borcum var' diye mesaj at." },
            { level: 4, text: "Liseden/Üniversiteden eski bir hocana Instagram'dan 'Hocam o notu vermeyecektiniz, hala unutmadım' yaz." },
            { level: 4, text: "Bir arkadaşının sevgilisine 'Dikkatli ol, çok tehlikeli sulardasın' mesajı at." },
            { level: 4, text: "Bütün sosyal medya hesaplarından profil fotoğrafını silip yerine bir çöp kovası resmi koy (Oyun sonuna kadar)." },
            { level: 4, text: "Birine 'Sonunda hamleni yaptım, iş tamam. Parayı hazırlayın.' yaz." }
        ];

        const card = document.getElementById('gameCard');
        const drawBtn = document.getElementById('drawBtn');
        const dareText = document.getElementById('dareText');
        const dareCategory = document.getElementById('dareCategory');
        
        // Geçmiş Modal Elementleri
        const historyBtn = document.getElementById('historyBtn');
        const historyModal = document.getElementById('historyModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const historyList = document.getElementById('historyList');
        const historyCount = document.getElementById('historyCount');
        
        const resetBtn = document.getElementById('resetBtn');
        
        let isFlipping = false;
        let drawnHistory = []; // Çekilen kartların geçmişini tutar
        let availableDares = []; // Çekilmeyen kartları (desteyi) tutar

        // Seviyelere göre renk ve isim ayarları
        const levelConfig = {
            1: { name: 'SEVİYE: HAFİF', color: '#10b981', glow: '#10b981' }, // Yeşil
            2: { name: 'SEVİYE: ORTA', color: '#eab308', glow: '#eab308' },  // Sarı
            3: { name: 'SEVİYE: AĞIR', color: '#f97316', glow: '#f97316' },  // Turuncu
            4: { name: 'SEVİYE: KAOS', color: '#ef4444', glow: '#ef4444' }   // Kırmızı
        };

        function drawCard() {
            if (isFlipping) return;
            isFlipping = true;

            if (card.classList.contains('is-flipped')) {
                card.classList.remove('is-flipped');
                setTimeout(() => {
                    revealNewDare();
                }, 800);
            } else {
                revealNewDare();
            }
        }

        // Diziyi rastgele karıştırmak için Fisher-Yates algoritması
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Oyunu ilk haline veya sıfırlanmış haline döndüren fonksiyon
        function initGame() {
            // Tüm cezaları kopyala ve desteyi karıştır
            availableDares = [...dares];
            shuffleArray(availableDares);
            
            // Geçmişi sıfırla
            drawnHistory = [];
            historyCount.textContent = '0';
            historyList.innerHTML = '<div class="text-center text-gray-400 italic py-10">Henüz hiç ceza çekilmedi. Masumiyet devam ediyor...</div>';
            
            // Kart arayüzünü başlangıç haline getir
            dareCategory.textContent = "CEZA";
            dareCategory.style.color = "#ec4899";
            dareText.textContent = "İlk kartı çekmek için aşağıdaki butona tıkla!";
            
            const cardBack = document.querySelector('.card-back');
            cardBack.style.borderColor = "#ec4899";
            cardBack.style.boxShadow = "0 0 20px rgba(236, 72, 153, 0.4), inset 0 0 20px rgba(236, 72, 153, 0.2)";
            
            if (card.classList.contains('is-flipped')) {
                card.classList.remove('is-flipped');
            }
        }

        function revealNewDare() {
            // Destede kart kalmadıysa uyar
            if (availableDares.length === 0) {
                dareText.textContent = "Tüm kartlar bitti! Yeniden başlamak için Sıfırla butonuna tıkla.";
                dareCategory.textContent = "OYUN BİTTİ";
                dareCategory.style.color = "#ffffff";
                
                const cardBack = document.querySelector('.card-back');
                cardBack.style.borderColor = "#ffffff";
                cardBack.style.boxShadow = "0 0 20px rgba(255, 255, 255, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.2)";
                
                card.classList.add('is-flipped');
                setTimeout(() => {
                    isFlipping = false;
                }, 800);
                return;
            }

            // Karıştırılmış desteden son kartı çek (Böylece asla tekrar etmez)
            const selectedDare = availableDares.pop();
            const config = levelConfig[selectedDare.level];

            // Arayüzü güncelle
            dareText.textContent = selectedDare.text;
            dareCategory.textContent = config.name;
            dareCategory.style.color = config.color;
            
            const cardBack = document.querySelector('.card-back');
            cardBack.style.borderColor = config.color;
            cardBack.style.boxShadow = `0 0 20px ${config.glow}66, inset 0 0 20px ${config.glow}33`; 

            // Geçmişe ekle
            addToHistory(selectedDare, config);

            // Kartı çevir
            card.classList.add('is-flipped');
            setTimeout(() => {
                isFlipping = false;
            }, 800);
        }

        function addToHistory(dare, config) {
            drawnHistory.unshift({ text: dare.text, config: config }); // Başa ekle
            historyCount.textContent = drawnHistory.length;
            renderHistory();
        }

        function renderHistory() {
            if(drawnHistory.length === 0) return;
            
            historyList.innerHTML = ''; // Listeyi temizle
            
            drawnHistory.forEach((item, index) => {
                const historyDiv = document.createElement('div');
                historyDiv.className = 'history-item';
                historyDiv.style.borderLeftColor = item.config.color;
                
                historyDiv.innerHTML = `
                    <div class="level-badge" style="background-color: ${item.config.color}33; color: ${item.config.color};">
                        ${item.config.name}
                    </div>
                    <div class="text-sm font-medium text-gray-200 mt-1">${item.text}</div>
                `;
                historyList.appendChild(historyDiv);
            });
        }

        // Modal Olay Dinleyicileri
        historyBtn.addEventListener('click', () => {
            historyModal.classList.add('active');
        });

        closeModalBtn.addEventListener('click', () => {
            historyModal.classList.remove('active');
        });

        // Modalin dışına tıklayınca kapatma
        historyModal.addEventListener('click', (e) => {
            if(e.target === historyModal) {
                historyModal.classList.remove('active');
            }
        });

        // Oyunu Sıfırlama Butonu İşlevi
        resetBtn.addEventListener('click', () => {
            resetBtn.classList.add('scale-95');
            setTimeout(() => resetBtn.classList.remove('scale-95'), 150);
            initGame();
        });

        // Butona ve karta tıklama olayları
        drawBtn.addEventListener('click', drawCard);
        card.addEventListener('click', drawCard);
        
        drawBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            drawCard();
        });

        // Sayfa yüklendiğinde desteyi hazırla
        initGame();
    </script>
</body>
</html>
